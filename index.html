<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>wu-shop</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>

        <template id="card-template">
            <div class="product-card">
                <div class="card-images">
                    <img class="product-img1">
                    <img class="product-img2">
                </div>
                <div class="card-info">
                    <p class="product-name"></p>
                    <p class="product-stock"></p>
                </div>
            </div>
        </template>

        <!-- LEFT: cards list -->
        <div class="products" id="container"></div>

        <!-- RIGHT: info panel -->
        <div class="info-main" id="info-main">
            <p class="info-placeholder">Select a product</p>
        </div>

        <script src="script.js"></script>
    </body>
</html>
